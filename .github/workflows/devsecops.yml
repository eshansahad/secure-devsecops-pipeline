name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: secure-devsecops-pipeline

jobs:

  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff Lint
        run: python -m ruff check .

      - name: Unit Tests
        run: python -m pytest

      - name: Bandit Scan
        run: python -m bandit -r app

      - name: Dependency Scan
        run: pip-audit

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  docker-build:
    name: Build Docker Image
    needs:
      - code-quality
      - secret-scan

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Save Image
        run: |
          docker save $IMAGE_NAME -o image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  trivy-scan:
    name: Container Security Scan
    needs: docker-build

    runs-on: ubuntu-latest

    steps:

      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          docker load -i image.tar

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  publish-ghcr:
    name: Publish Image to GHCR

    needs: trivy-scan

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:

      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: |
          docker load -i image.tar

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Tag Image
        run: |
          docker tag $IMAGE_NAME \
          ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest