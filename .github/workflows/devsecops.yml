name: DevSecOps Pipeline

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: secure-devsecops-pipeline

jobs:

  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: |
          python -m ruff check .

      - name: Run Unit Tests
        run: |
          python -m pytest

      - name: Run Bandit
        run: |
          python -m bandit -r app

      - name: Run Dependency Scan
        run: |
          pip-audit

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  docker-build:
    name: Build Docker Image
    needs:
      - code-quality
      - secret-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Save Docker Image
        run: |
          docker save $IMAGE_NAME -o secure-app.tar

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: secure-app-image
          path: secure-app.tar

  trivy-scan:
    name: Container Security Scan
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: secure-app-image

      - name: Load Docker Image
        run: |
          docker load -i secure-app.tar

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"

  publish-ghcr:
    name: Publish Image to GHCR
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Tag Image
        run: |
          docker tag $IMAGE_NAME ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  azure-deploy:
    name: Deploy to Azure Container Apps
    needs: publish-ghcr
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Latest Image
        run: |
          az containerapp update \
            --name secure-devsecops-app \
            --resource-group RG-DevSecOpsLab \
            --image ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest